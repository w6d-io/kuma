<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuma · RBAC Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  </head>
  <body>
    <!-- Runtime config — replaced by envsubst in Docker CMD. -->
    <!-- API_BASE:    absolute URL of the jinbe API, e.g. https://jinbe.dev.w6d.io -->
    <!--              Leave empty to use relative /api (Oathkeeper proxies /api on same domain). -->
    <!-- AUTH_DOMAIN: bare hostname of the auth login UI, e.g. auth.dev.w6d.io -->
    <!--              Used for redirect on 401 responses. Required in env-isolated test/dev. -->
    <script>
      window.__API_BASE__ = "${API_BASE}";
      window.__AUTH_DOMAIN__ = "${AUTH_DOMAIN}";
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
