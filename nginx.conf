server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api to jinbe — variable defers DNS resolution (k8s CoreDNS)
    location /api/ {
        set $jinbe "${JINBE_URL}";
        proxy_pass $jinbe/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward Oathkeeper identity headers
        proxy_set_header X-User-Email $http_x_user_email;
        proxy_set_header X-User-Id $http_x_user_id;
        proxy_set_header X-User-Name $http_x_user_name;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
